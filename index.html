<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skin Type Survey</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2 class="stats-title">Skin Type Insights</h2>
  <br>
<img src="https://gunillaofsweden.com/wp-content/uploads/2017/08/skin-types-21.jpg">
  <p class="subcaption"><strong>Based on a small survey of 50 participants</strong></p>
<h2>Skin Type Survey Results:</h2>

<div class="chart">
  <p>Oily Skin</p>
  <div class="bar oily">30%</div>

  <p>Dry Skin</p>
  <div class="bar dry">25%</div>

  <p>Combination Skin</p>
  <div class="bar combination">35%</div>

  <p>Sensitive Skin</p>
  <div class="bar sensitive">10%</div>
</div>

<h2>Find Your Skin Type</h2>

<p>How does your skin feel after washing?</p>

<button onclick="checkSkin('dry')">Tight and dry</button>
<button onclick="checkSkin('oily')">Shiny and oily</button>
<button onclick="checkSkin('combination')">Oily in the T-zone</button>
<button onclick="checkSkin('normal')">Balanced and comfortable</button>

<p id="result"></p>
  <script src="script.js"></script>
</body>
</html>
